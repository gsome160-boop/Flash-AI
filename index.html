<script>
    // الانتقال من الشعار للاسم
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('name-screen').style.display = 'block';
            setTimeout(() => document.getElementById('name-screen').style.opacity = '1', 50);
        }, 1000);
    }, 2000);

    // عند كتابة الاسم
    document.getElementById('nameInput').onkeypress = function(e) {
        if (e.key === 'Enter') {
            document.getElementById('welcomeMsg').innerText = "أهلاً بك يا " + this.value;
            document.getElementById('name-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('name-screen').style.display = 'none';
                document.getElementById('ai-screen').style.display = 'block';
                setTimeout(() => document.getElementById('ai-screen').style.opacity = '1', 50);
            }, 1000);
        }
    };

    // عند كتابة سؤال في صندوق الذكاء الاصطناعي
    document.getElementById('aiInput').onkeypress = function(e) {
        if (e.key === 'Enter') {
            // عرض الرد في الصفحة الحالية
            document.getElementById('response').innerText = "الرد الذكي على سؤالك '" + this.value + "' هو: (هنا سيظهر الرد)";
            
            // الانتظار 5 ثوانٍ قبل الانتقال للشاشة النهائية ليتمكن المستخدم من القراءة
            setTimeout(() => {
                document.getElementById('ai-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('ai-screen').style.display = 'none';
                    document.getElementById('final-screen').style.display = 'block';
                    setTimeout(() => document.getElementById('final-screen').style.opacity = '1', 50);
                }, 1000);
            }, 5000); 
        }
    };
</script>
