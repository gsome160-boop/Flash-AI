<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Flash AI</title>
    <style>
        body { 
            margin: 0; 
            background: #0b1120; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        .screen { 
            position: absolute; 
            text-align: center; 
            transition: opacity 1s; 
            width: 100%; 
        }
        input { 
            padding: 15px; 
            border-radius: 25px; 
            border: 1px solid #38bdf8; 
            background: #1e293b; 
            color: white; 
            width: 80%; 
            max-width: 300px; 
            outline: none; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>

    <div id="screen1" class="screen">
        <h1>Flash AI</h1>
    </div>

    <div id="screen2" class="screen" style="opacity: 0; display: none;">
        <h2>ما هو اسمك؟</h2>
        <input type="text" id="nameInput" placeholder="اكتب اسمك واضغط Enter">
    </div>

    <div id="screen3" class="screen" style="opacity: 0; display: none;">
        <h2 id="welcomeText"></h2>
        <input type="text" id="aiInput" placeholder="اسأل أي سؤال واضغط Enter">
        <p id="responseText" style="margin-top: 20px; color: #38bdf8;"></p>
    </div>

    <script>
        // الانتقال من الشاشة 1 إلى 2
        setTimeout(() => {
            document.getElementById('screen1').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('screen1').style.display = 'none';
                document.getElementById('screen2').style.display = 'block';
                setTimeout(() => document.getElementById('screen2').style.opacity = '1', 100);
            }, 1000);
        }, 2000);

        // معالجة الاسم والانتقال للشاشة 3
        document.getElementById('nameInput').onkeypress = function(e) {
            if (e.key === 'Enter') {
                document.getElementById('welcomeText').innerText = "أهلاً بك يا " + this.value;
                document.getElementById('screen2').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('screen2').style.display = 'none';
                    document.getElementById('screen3').style.display = 'block';
                    setTimeout(() => document.getElementById('screen3').style.opacity = '1', 100);
                }, 1000);
            }
        };

        // معالجة السؤال
        document.getElementById('aiInput').onkeypress = function(e) {
            if (e.key === 'Enter') {
                document.getElementById('responseText').innerText = "جاري التحليل: " + this.value + "... الرد: هذا هو رد الذكاء الاصطناعي لك!";
            }
        };
    </script>
</body>
</html>
