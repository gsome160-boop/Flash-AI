<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Flash AI</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #1e293b; padding: 20px; border-left: 1px solid #334155; }
        .history-item { padding: 10px; margin-bottom: 5px; background: #334155; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .history-item:hover { background: #475569; }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #flash-logo { font-size: 50px; font-weight: bold; color: #38bdf8; margin-bottom: 20px; }
        #input-area { width: 80%; max-width: 600px; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; background: #1e293b; color: white; outline: none; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>السجلات القديمة</h3>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="flash-logo">Flash AI</div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="اكتب استفسارك هنا واضغط Enter..." onkeypress="handleEnter(event)">
        </div>
    </div>

    <script>
        // السكربت البرمجي (المنطق)
        function handleEnter(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('user-input');
                const text = input.value;
                if (text.trim() !== "") {
                    saveToHistory(text);
                    input.value = "";
                    alert("جاري المعالجة بواسطة Flash AI: " + text); // هنا مستقبلاً تربط الـ API
                }
            }
        }

        function saveToHistory(text) {
            // حفظ في ذاكرة المتصفح المحلية (LocalStorage)
            let history = JSON.parse(localStorage.getItem('flash_history') || "[]");
            history.push(text);
            localStorage.setItem('flash_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            const history = JSON.parse(localStorage.getItem('flash_history') || "[]");
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item;
                list.appendChild(div);
            });
        }

        // تحميل السجلات عند فتح الموقع
        window.onload = renderHistory;
    </script>
</body>
</html>
