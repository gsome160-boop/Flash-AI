<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Flash AI</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #1e293b; padding: 20px; border-left: 1px solid #334155; }
        .history-item { padding: 10px; margin-bottom: 5px; background: #334155; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #flash-logo { font-size: 50px; font-weight: bold; color: #38bdf8; margin-bottom: 20px; }
        #input-area { width: 80%; max-width: 600px; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; background: #1e293b; color: white; border: 1px solid #334155; outline: none; }
        
        /* الرد الاحترافي */
        #response-area { 
            margin-top: 20px; padding: 20px; background: #1e293b; border-radius: 15px; 
            width: 80%; max-width: 600px; text-align: center; 
            opacity: 0; transition: opacity 0.5s ease-in; /* الترانزيشن هنا */
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>السجلات القديمة</h3>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="flash-logo">Flash AI</div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." onkeypress="handleEnter(event)">
        </div>
        <div id="response-area"></div>
    </div>

    <script>
        function handleEnter(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('user-input');
                const text = input.value;
                if (text.trim() !== "") {
                    saveToHistory(text);
                    showResponse(text); // الرد الفوري
                    input.value = "";
                }
            }
        }

        function showResponse(query) {
            const resArea = document.getElementById('response-area');
            resArea.style.opacity = '1'; // إظهار الترانزيشن
            
            let answer = "";
            // الرد الخاص بالمصمم
            if (query.includes("مصمم") || query.includes("مُصمم")) {
                answer = "أهلاً يا بطل! 🚀 المصمم والمبرمج العبقري هو المبدع: **أبوالقاسم البشرى** 👨‍💻✨.";
            } else {
                answer = "سؤال ذكي يا Ablxq9! 🔥 بناءً على البيانات، جواب سؤالك هو: '" + query + "' يمثل انطلاقة قوية في مشروعك! 💡";
            }
            
            resArea.innerText = answer;
        }

        function saveToHistory(text) {
            let history = JSON.parse(localStorage.getItem('flash_history') || "[]");
            history.push(text);
            localStorage.setItem('flash_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            JSON.parse(localStorage.getItem('flash_history') || "[]").forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item;
                list.appendChild(div);
            });
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
