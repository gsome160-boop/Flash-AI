<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Flash AI</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #1e293b; padding: 20px; border-left: 1px solid #334155; }
        .history-item { padding: 10px; margin-bottom: 5px; background: #334155; border-radius: 5px; cursor: pointer; }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #flash-logo { font-size: 40px; font-weight: bold; color: #38bdf8; margin-bottom: 20px; }
        input { width: 80%; max-width: 500px; padding: 15px; border-radius: 25px; border: 1px solid #38bdf8; background: #1e293b; color: white; outline: none; }
        
        /* هذا هو كود الترانزيشن المكتوب */
        #response-area { 
            margin-top: 20px; padding: 20px; background: #1e293b; border-radius: 15px; 
            width: 80%; max-width: 600px; text-align: center; display: none; 
            border: 1px solid #38bdf8; 
            opacity: 0; 
            transition: opacity 1s ease-in-out; /* هنا الترانزيشن */
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>سجل المحادثات</h3>
        <div id="history-list"></div>
    </div>
    <div id="main">
        <div id="flash-logo">Flash AI</div>
        <input type="text" id="user-input" placeholder="اكتب اسمك للبدء..." onkeypress="handleInput(event)">
        <div id="response-area"></div>
    </div>

    <script>
        let userName = "";

        function handleInput(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('user-input');
                const text = input.value.trim();
                const resArea = document.getElementById('response-area');
                
                if (text === "") return;

                if (userName === "") {
                    userName = text;
                    resArea.style.display = 'block';
                    resArea.innerText = "أهلاً بك يا " + userName + "! أنا Flash AI، صمم هذا النظام المبدع: أبوالقاسم البشرى. كيف يمكنني مساعدتك اليوم؟";
                    input.placeholder = "اسألني أي شيء...";
                } else {
                    saveToHistory(text);
                    resArea.style.opacity = '0'; // إخفاء للبدء بالترانزيشن
                    setTimeout(() => {
                        resArea.innerText = "سؤال ممتاز يا " + userName + "! بصفتك ضيف المبرمج 'أبوالقاسم'، أقول لك: هذا المشروع هو بداية انطلاقة قوية. 🔥";
                        resArea.style.opacity = '1'; // تفعيل الترانزيشن
                    }, 100);
                }
                input.value = "";
            }
        }

        function saveToHistory(text) {
            let history = JSON.parse(localStorage.getItem('flash_history') || "[]");
            history.push(text);
            localStorage.setItem('flash_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            JSON.parse(localStorage.getItem('flash_history') || "[]").forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item;
                list.appendChild(div);
            });
        }
        window.onload = renderHistory;
    </script>
</body>
</html>
