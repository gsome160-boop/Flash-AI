<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Flash AI</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #1e293b; padding: 20px; border-left: 1px solid #334155; }
        .history-item { padding: 10px; margin-bottom: 5px; background: #334155; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .history-item:hover { background: #475569; }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #flash-logo { font-size: 50px; font-weight: bold; color: #38bdf8; margin-bottom: 20px; }
        #input-area { width: 80%; max-width: 600px; }
        #user-input { width: 100%; padding: 15px; border-radius: 25px; border: none; background: #1e293b; color: white; border: 1px solid #334155; }
        #response-area { margin-top: 20px; padding: 20px; background: #1e293b; border-radius: 10px; width: 80%; max-width: 600px; text-align: center; display: none; border: 1px solid #38bdf8; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>السجلات القديمة</h3>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="flash-logo">Flash AI</div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="اسألني أي شيء..." onkeypress="handleEnter(event)">
        </div>
        <div id="response-area"></div>
    </div>

    <script>
        function handleEnter(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('user-input');
                const text = input.value;
                if (text.trim() !== "") {
                    saveToHistory(text);
                    generateResponse(text); 
                    input.value = "";
                }
            }
        }

        async function generateResponse(query) {
            const resArea = document.getElementById('response-area');
            resArea.style.display = 'block';
            resArea.innerText = "جاري البحث في الإنترنت... 🔍";

            // محاكاة للذكاء الاصطناعي (هنا نضع المنطق)
            setTimeout(() => {
                let answer = "";
                if (query.includes("مصمم") || query.includes("صممك")) {
                    answer = "المصمم والمبرمج العبقري هو أبوالقاسم البشرى! 👨‍💻✨";
                } else {
                    answer = "أهلاً بك يا Ablxq9! لقد وجدت إجابة لسؤالك: '" + query + "'. استمر في البرمجة فأنت في الطريق الصحيح! 🚀🔥";
                }
                resArea.innerText = answer;
            }, 1500); // تأخير بسيط لمحاكاة سرعة البحث
        }

        function saveToHistory(text) {
            let history = JSON.parse(localStorage.getItem('flash_history') || "[]");
            history.push(text);
            localStorage.setItem('flash_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            JSON.parse(localStorage.getItem('flash_history') || "[]").forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item;
                list.appendChild(div);
            });
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
