<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0b1120; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen { position: absolute; text-align: center; transition: opacity 1s ease-in-out; width: 100%; }
        input { padding: 15px; border-radius: 25px; border: 1px solid #38bdf8; background: #1e293b; color: white; width: 80%; max-width: 300px; outline: none; margin-top: 20px; }
        #ai-screen, #final-screen { display: none; }
    </style>
</head>
<body>

    <div id="splash" class="screen">
        <h1>Flash AI</h1>
    </div>

    <div id="name-screen" class="screen" style="opacity: 0;">
        <h2>ما هو اسمك؟</h2>
        <input type="text" id="nameInput" placeholder="اكتب هنا...">
    </div>

    <div id="final-screen" class="screen" style="opacity: 0;">
        <h2 id="welcomeMsg"></h2>
        <a href="https://gsome160-boop.github.io/Flash-AI/" style="color:#38bdf8; font-size: 1.2em;">اضغط هنا للتوجه للرابط</a>
    </div>

    <script>
        // الانتقال من البداية للاسم
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('name-screen').style.opacity = '1';
            }, 1000);
        }, 2000);

        // عند كتابة الاسم والضغط على Enter
        document.getElementById('nameInput').onkeypress = function(e) {
            if (e.key === 'Enter') {
                document.getElementById('welcomeMsg').innerText = "أهلاً بك يا " + this.value;
                document.getElementById('name-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('name-screen').style.display = 'none';
                    document.getElementById('final-screen').style.display = 'block';
                    document.getElementById('final-screen').style.opacity = '1';
                }, 1000);
            }
        };
    </script>
</body>
</html>
